name: Apply RoleForge completion repair

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          repository: russelldudek/harris
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply audited source payload
        shell: bash
        run: |
          test -s .roleforge-payload.b64
          base64 -d .roleforge-payload.b64 | tar -xz
          rm .roleforge-payload.b64
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install PDF tooling
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Generate PDFs
        run: node scripts/generate-pdfs.mjs
      - name: Verify PDF contracts
        shell: bash
        run: |
          test "$(pdfinfo docs/Russell-Dudek-ServiceLink-Resume.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-ServiceLink-Cover-Letter.pdf | awk '/^Pages:/{print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-ServiceLink-Interview-Brief.pdf | awk '/^Pages:/{print $2}')" = "3"
          test "$(pdfinfo docs/Russell-Dudek-ServiceLink-90-Day-Plan.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-ServiceLink-AI-Dispatch-Ticket.pdf | awk '/^Pages:/{print $2}')" = "1"
      - name: Commit complete audited campaign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete RoleForge campaign audit [skip ci]"
          git push origin main
